name: Build Windows Desktop Qt

on:
  push:
    tags:
      - "desktop-qt-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example 1.0.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      PYTHONUTF8: "1"
      MISTRELAY_QT_UPDATE_VERIFY_KEY: ${{ secrets.QT_UPDATE_VERIFY_KEY }}
      QT_UPDATE_VERIFY_KEY: ${{ secrets.QT_UPDATE_VERIFY_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: release
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $version = "${{ inputs.version }}"
            $tag = "desktop-qt-v$version"
          } else {
            $tag = "${{ github.ref_name }}"
            $version = $tag -replace '^desktop-qt-v', ''
          }
          if ($version -notmatch '^\d+\.\d+\.\d+([-.+][0-9A-Za-z.-]+)?$') {
            throw "Invalid version: $version"
          }
          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=$tag" >> $env:GITHUB_OUTPUT

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate update signing keys
        shell: pwsh
        env:
          QT_UPDATE_PRIVATE_KEY: ${{ secrets.QT_UPDATE_PRIVATE_KEY }}
          QT_UPDATE_VERIFY_KEY: ${{ secrets.QT_UPDATE_VERIFY_KEY }}
        run: |
          if (-not $env:QT_UPDATE_PRIVATE_KEY) {
            throw "QT_UPDATE_PRIVATE_KEY is missing. Configure it in GitHub repository Secrets before publishing."
          }
          if (-not $env:QT_UPDATE_VERIFY_KEY) {
            throw "QT_UPDATE_VERIFY_KEY is missing. Configure it in GitHub repository Secrets before publishing."
          }
          python -c "import base64, os, sys; from nacl.signing import SigningKey; private_key = os.environ['QT_UPDATE_PRIVATE_KEY'].strip(); expected = os.environ['QT_UPDATE_VERIFY_KEY'].strip(); actual = base64.b64encode(bytes(SigningKey(base64.b64decode(private_key)).verify_key)).decode('ascii'); sys.exit('QT_UPDATE_PRIVATE_KEY does not match QT_UPDATE_VERIFY_KEY') if actual != expected else print('Update signing keys validated.')"

      - name: Install NSIS
        run: choco install nsis -y --no-progress

      - name: Sync version metadata
        shell: pwsh
        run: |
          $payload = Get-Content version.json -Raw | ConvertFrom-Json
          $payload.version = "${{ steps.release.outputs.version }}"
          $payload.channel = "stable"
          $verifyKey = $env:MISTRELAY_QT_UPDATE_VERIFY_KEY
          if (-not $verifyKey) {
            $verifyKey = $env:QT_UPDATE_VERIFY_KEY
          }
          if ($verifyKey) {
            $payload.verify_key = $verifyKey
          }
          $payload | ConvertTo-Json -Depth 20 | Set-Content version.json -Encoding UTF8

      - name: Run pre-release checks
        shell: pwsh
        run: python scripts/dev_env.py release-check --require-update-key

      - name: Build installer
        shell: pwsh
        run: python scripts/dev_env.py build --clean

      - name: Generate file patch
        id: patch
        shell: pwsh
        env:
          QT_UPDATE_PRIVATE_KEY: ${{ secrets.QT_UPDATE_PRIVATE_KEY }}
          QT_UPDATE_VERIFY_KEY: ${{ secrets.QT_UPDATE_VERIFY_KEY }}
        run: |
          if (-not $env:QT_UPDATE_PRIVATE_KEY) {
            Write-Host "QT_UPDATE_PRIVATE_KEY is not configured; skipping file patch generation."
            exit 0
          }
          $currentTag = "${{ steps.release.outputs.tag }}"
          $version = "${{ steps.release.outputs.version }}"
          $previousTag = git tag --list 'desktop-qt-v*' --sort=-v:refname | Where-Object { $_ -ne $currentTag } | Select-Object -First 1
          if (-not $previousTag) {
            Write-Host "No previous desktop-qt tag found; skipping file patch generation."
            exit 0
          }
          $fromVersion = $previousTag -replace '^desktop-qt-v', ''
          $oldRoot = "build/patch-old-src"
          git worktree add --detach $oldRoot $previousTag
          python "$oldRoot/scripts/dev_env.py" build --clean --skip-installer
          $patch = "dist/windows/qt-patch-$fromVersion-to-$version.zip"
          $patchUrl = "https://github.com/${{ github.repository }}/releases/download/$currentTag/qt-patch-$fromVersion-to-$version.zip"
          python scripts/release_manifest.py generate-patch `
            --from-version $fromVersion `
            --to-version $version `
            --old-dir "$oldRoot/dist/windows/pyinstaller/MistRelay" `
            --new-dir "dist/windows/pyinstaller/MistRelay" `
            --output $patch `
            --download-url $patchUrl `
            --private-key $env:QT_UPDATE_PRIVATE_KEY
          if ($env:QT_UPDATE_VERIFY_KEY) {
            python scripts/release_manifest.py verify-patch `
              --patch $patch `
              --public-key $env:QT_UPDATE_VERIFY_KEY `
              --from-version $fromVersion `
              --to-version $version
          }
          "patch=$patch" >> $env:GITHUB_OUTPUT
          "patch_url=$patchUrl" >> $env:GITHUB_OUTPUT
          "patch_from_version=$fromVersion" >> $env:GITHUB_OUTPUT

      - name: Generate update manifest
        shell: pwsh
        env:
          QT_UPDATE_PRIVATE_KEY: ${{ secrets.QT_UPDATE_PRIVATE_KEY }}
          QT_UPDATE_VERIFY_KEY: ${{ secrets.QT_UPDATE_VERIFY_KEY }}
        run: |
          if (-not $env:QT_UPDATE_PRIVATE_KEY) {
            throw "QT_UPDATE_PRIVATE_KEY is not configured; cannot generate required qt-latest.json and qt-latest.json.sig assets."
          }
          $version = "${{ steps.release.outputs.version }}"
          $tag = "${{ steps.release.outputs.tag }}"
          $installer = "dist/windows/mistrelay-v$version-setup.exe"
          $downloadUrl = "https://github.com/${{ github.repository }}/releases/download/$tag/mistrelay-v$version-setup.exe"
          $generateArgs = @(
            "scripts/release_manifest.py", "generate",
            "--version", $version,
            "--installer", $installer,
            "--download-url", $downloadUrl,
            "--output", "dist/windows/qt-latest.json",
            "--signature-output", "dist/windows/qt-latest.json.sig",
            "--private-key", $env:QT_UPDATE_PRIVATE_KEY
          )
          $patch = "${{ steps.patch.outputs.patch }}"
          if ($patch) {
            $generateArgs += @(
              "--patch", $patch,
              "--patch-url", "${{ steps.patch.outputs.patch_url }}",
              "--patch-from-version", "${{ steps.patch.outputs.patch_from_version }}"
            )
          }
          python @generateArgs
          if ($env:QT_UPDATE_VERIFY_KEY) {
            python scripts/release_manifest.py verify `
            --version $version `
            --installer $installer `
            --download-url $downloadUrl `
              --manifest dist/windows/qt-latest.json `
              --signature dist/windows/qt-latest.json.sig `
              --public-key $env:QT_UPDATE_VERIFY_KEY
          }
          $requiredAssets = @("dist/windows/qt-latest.json", "dist/windows/qt-latest.json.sig")
          foreach ($asset in $requiredAssets) {
            if (-not (Test-Path $asset)) {
              throw "Required update asset was not generated: $asset"
            }
            if ((Get-Item $asset).Length -le 0) {
              throw "Required update asset is empty: $asset"
            }
          }
          $assetDir = "dist/windows/release-assets"
          New-Item -ItemType Directory -Force -Path $assetDir | Out-Null
          Copy-Item $installer $assetDir
          Copy-Item "dist/windows/qt-latest.json" $assetDir
          Copy-Item "dist/windows/qt-latest.json.sig" $assetDir
          $patch = "${{ steps.patch.outputs.patch }}"
          if ($patch -and (Test-Path $patch)) {
            Copy-Item $patch $assetDir
          }

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          name: MistRelay v${{ steps.release.outputs.version }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: dist/windows/release-assets/*
